# Prita GraphQL schema, synced by hand from the api (api/src/graphql on main).
# cynic type-checks the CLI's queries against this at compile time. Keep it in
# sync when the API schema changes. Timestamps are plain rfc3339 strings; the
# only custom scalar is Json (the reading-preferences blob).

scalar Json

type Query {
  "The user's whole tag tree as a flat list; each tag carries parentId."
  tags: [Tag!]!
  "No tag: everything saved, newest-saved first. With tag: articles under it."
  articles(tag: ID, includeDescendants: Boolean! = true, after: String, first: Int): ArticleConnection!
  article(id: ID!): Article
  "The current user's reading preferences, or null if never set."
  readingPreferences: Json
}

type Mutation {
  createTag(input: CreateTagInput!): Tag!
  renameTag(input: RenameTagInput!): Tag!
  setTagColor(input: SetTagColorInput!): Tag!
  moveTag(input: MoveTagInput!): Tag!
  deleteTag(id: ID!): DeleteTagResult!
  createTagPath(input: CreateTagPathInput!): [Tag!]!
  pinTag(id: ID!): Tag!
  unpinTag(id: ID!): Tag!
  tagArticle(input: TagArticleInput!): Article!
  untagArticle(input: UntagArticleInput!): Article!
  "Upload a new article from a URL."
  uploadArticle(input: UploadArticleInput!): ArticleUploadResult!
  deleteArticle(id: ID!): Article!
  saveReadingProgress(input: SaveReadingProgressInput!): Boolean!
  updateReadingPreferences(input: UpdateReadingPreferencesInput!): Json!
}

type Article {
  id: ID!
  title: String!
  content: String!
  textContent: String!
  length: Int!
  description: String
  author: String
  siteName: String
  lang: String
  publishedTime: String
  url: String!
  iconUrl: String
  imageUrl: String
  capturedAt: String!
  readingProgressPercent: Int
  readingProgressTopPercent: Int
  readingProgressAnchorIdx: Int
  readAt: String
  tags: [Tag!]!
}

type ArticleUploadResult {
  article: Article!
  wasAlreadySaved: Boolean!
}

type Tag {
  id: ID!
  name: String!
  color: TagColor
  parentId: ID
  kind: TagKind!
  createdAt: String!
  pinnedAt: String
  directCount: Int!
  subtreeCount: Int!
}

type DeleteTagResult {
  deletedTagIds: [ID!]!
  deletedCount: Int!
}

enum TagColor { TOMATO CRIMSON PLUM VIOLET INDIGO BLUE TEAL GRASS AMBER BROWN }
enum TagKind { USER UP_NEXT FAVORITES }

type ArticleConnection {
  edges: [ArticleEdge!]!
  pageInfo: PageInfo!
}

type ArticleEdge {
  cursor: String!
  node: Article!
}

type PageInfo {
  hasPreviousPage: Boolean!
  hasNextPage: Boolean!
  startCursor: String
  endCursor: String
}

input UploadArticleInput {
  url: String!
  content: String
}

input SaveReadingProgressInput {
  articleId: ID!
  readingProgressPercent: Int!
  readingProgressAnchorIdx: Int
}

input UpdateReadingPreferencesInput {
  preferences: Json!
}

input CreateTagInput {
  name: String!
  parentId: ID
  color: TagColor
}

input RenameTagInput {
  id: ID!
  name: String!
}

input SetTagColorInput {
  id: ID!
  color: TagColor
}

input MoveTagInput {
  id: ID!
  parentId: ID
}

input CreateTagPathInput {
  segments: [String!]!
}

input TagArticleInput {
  articleId: ID!
  tagId: ID!
}

input UntagArticleInput {
  articleId: ID!
  tagId: ID!
}
